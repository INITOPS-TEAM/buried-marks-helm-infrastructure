global:
  isEKS:
    enabled: true
  gateway:
    enabled: false

gateway:
  gatewayClassName: amazon-vpc-lattice
  controllerName: ""

map-service:
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-map-microservice
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 2
  httpRoute:
    enabled: false
  livenessProbe:
    httpGet:
      path: /health/
      port: 9001
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 10
  readinessProbe:
    httpGet:
      path: /health/
      port: 9001
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 10
  mariadb:
    primary:
      persistence:
        enabled: true
        size: 1Gi

auth-service:
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-authentication-microservice
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 2
  httpRoute:
    enabled: false
  livenessProbe: {}
  readinessProbe: {}
  postgresql:
    primary:
      persistence:
        enabled: true
        size: 3Gi

mail-service:
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-mail-microservice
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 1
  httpRoute:
    enabled: false
  valkey:
    primary:
      persistence:
        enabled: true
        size: 1Gi

voting-service:
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-voting-microservice
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 2
  httpRoute:
    enabled: false
  livenessProbe: {}
  readinessProbe: {}
  postgresql:
    primary:
      persistence:
        enabled: true
        size: 5Gi

login-front:
  replicaCount: 2
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-login-front
    pullPolicy: IfNotPresent
    tag: "latest"
  httpRoute:
    enabled: false

map-front:
  replicaCount: 2
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-map-front
    pullPolicy: IfNotPresent
    tag: "latest"
  httpRoute:
    enabled: false

voting-front:
  replicaCount: 2
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-voting-front
    pullPolicy: IfNotPresent
    tag: "latest"
  httpRoute:
    enabled: false

admin-front:
  replicaCount: 2
  image:
    repository: 531331080468.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-admin-front
    pullPolicy: IfNotPresent
    tag: "latest"
  httpRoute:
    enabled: false

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d              # Зберігаємо метрики мінімум 2 тижні
      replicas: 2                 # High Availability: 2 поди Прометеуса
      resources:
        requests:
          memory: 2Gi
          cpu: 500m
        limits:
          memory: 4Gi             # Прометеус може споживати багато пам'яті
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 30Gi     # Більше місця для довгої історії метрик

  grafana:
    persistence:
      size: 10Gi

  alertmanager:
    enabled: true
    config:
      receivers:
        - name: "slack"
          slack_configs:
            - api_url: "https://hooks.slack.com/services/XXX/XXX/XXX"
              channel: "#alerts-prod"
              send_resolved: true
