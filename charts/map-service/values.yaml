replicaCount: 1

image:
  repository: 833822972731.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-map-microservice
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
# - name: ecr-secret

serviceAccount:
  create: true
  # Exact name is needed for EKS Pod Identity Association for RDS
  name: "map-service"

podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 9001

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
  - name: buried-marks-gateway
    sectionName: https
  # hostnames:
  # - buried-marks.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/markers/
  - matches:
    - path:
        type: PathPrefix
        value: /api/categories/

resources: {}

envSecret: map-service-secret
awsSecretName: buried-marks/map-service

readinessProbe:
  httpGet:
    path: /health/
    port: 9001
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 10

volumes:
- name: jwt-public-key
  secret:
    secretName: map-service-secret
    items:
    - key: JWT_PUBLIC_KEY
      path: ec_public.key
# - name: jwt-private-key
#   secret:
#     secretName: map-service-secret
#     items:
#       - key: JWT_PRIVATE_KEY
#         path: ec_private.key

volumeMounts:
- name: jwt-public-key
  mountPath: "/app/ec_public.key"
  subPath: ec_public.key
  readOnly: true
# - name: jwt-private-key
#   mountPath: "/app/ec_private.key"
#   subPath: ec_private.key
#   readOnly: true

db:
  host: map-service-mariadb
  port: 3306

mariadb:
  auth:
    existingSecret: map-service-secret
    database: buriedmarks
    username: buriedmarks
  primary:
    persistence:
      enabled: false

global:
  aws:
    region: eu-north-1
  secrets:
    map-service: buried-marks/map-service
    buried-marks-helm-map-microservice: buried-marks/map-service
