replicaCount: 1

podAnnotations:
  consul.hashicorp.com/connect-inject: "true"

image:
  repository: 833822972731.dkr.ecr.eu-north-1.amazonaws.com/buried-marks-map-microservice
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
# - name: ecr-secret

serviceAccount:
  create: true
  # Exact name is needed for EKS Pod Identity Association for RDS
  name: "map-service"

podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 9001

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
  - name: buried-marks-gateway
    sectionName: https
  # hostnames:
  # - buried-marks.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/markers/
  - matches:
    - path:
        type: PathPrefix
        value: /api/categories/
  - matches:
      - path:
          type: PathPrefix
          value: /api/internal/marks/

resources: {}

envSecret: map-service-secret
awsSecretName: buried-marks/map-service

readinessProbe:
  httpGet:
    path: /health/
    port: 9001
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 10

volumes:
- name: jwt-public-key
  secret:
    secretName: map-service-secret
    items:
    - key: JWT_PUBLIC_KEY
      path: ec_public.key

volumeMounts:
- name: jwt-public-key
  mountPath: "/app/ec_public.key"
  subPath: ec_public.key
  readOnly: true

db:
  host: map-service-mariadb
  port: 3306

s3:
  bucketName: env-bucket-name

global:
  aws:
    region: eu-north-1
  secrets:
    map-service: buried-marks/map-service
    buried-marks-helm-map-microservice: buried-marks/map-service
