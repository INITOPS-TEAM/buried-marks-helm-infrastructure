envSecret: monitoring-secrets
awsSecretName: buried-marks/monitoring

global:
  aws:
    region: eu-north-1
  secrets:
    monitoring: buried-marks/monitoring
    buried-marks-helm-monitoring: buried-marks/monitoring

kube-prometheus-stack:
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 7d
      # storageSpec:
      #   volumeClaimTemplate:
      #     spec:
      #       storageClassName: gp2-ebs
      #       accessModes: ["ReadWriteOnce"]
      #       resources:
      #         requests:
      #           storage: 10Gi
      ruleNamespaceSelectorNilUsesHelmValues: false
      additionalScrapeConfigs:
        # Backend services check
        - job_name: 'kubernetes-backend-services'
          scrape_interval: 30s
          scrape_timeout: 10s
          metrics_path: /probe
          params:
            module: [http_2xx]
          kubernetes_sd_configs:
            - role: service
              namespaces:
                names:
                  - buried-marks
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              regex: '.*-microservice$'
              action: keep
            - source_labels: [__meta_kubernetes_service_name]
              target_label: __tmp_path
              replacement: '/admin/'
            - source_labels: [__meta_kubernetes_service_name]
              regex: 'map-microservice'
              target_label: __tmp_path
              replacement: '/health/'
            - source_labels: [__meta_kubernetes_service_name]
              regex: 'voting-microservice'
              target_label: __tmp_path
              replacement: '/healthcheck'
            - source_labels: [__meta_kubernetes_service_name]
              regex: 'mail-microservice'
              target_label: __tmp_path
              replacement: '/api/send-invite'
            - source_labels: [__meta_kubernetes_service_name]
              regex: 'mail-microservice'
              target_label: __param_module
              replacement: 'http_405_ok'
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_namespace, __meta_kubernetes_service_port_number, __tmp_path]
              separator: ';'
              regex: '(.*);(.*);(.*);(.*)'
              target_label: __param_target
              replacement: 'http://${1}.${2}.svc.cluster.local:${3}${4}'

            - source_labels: [__meta_kubernetes_service_name]
              target_label: service
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_service_name]
              target_label: instance
            - target_label: __address__
              replacement: monitoring-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115

        # Frontend services check
        - job_name: 'kubernetes-frontend-services'
          scrape_interval: 30s
          scrape_timeout: 10s
          metrics_path: /probe
          params:
            module: [http_2xx]
          kubernetes_sd_configs:
            - role: service
              namespaces:
                names:
                  - buried-marks
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              regex: '.*-front$'
              action: keep
            - source_labels: [__meta_kubernetes_service_name]
              target_label: service
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_namespace, __meta_kubernetes_service_port_number]
              separator: ';'
              regex: '(.*);(.*);(.*)'
              target_label: __param_target
              replacement: 'http://${1}.${2}.svc.cluster.local:${3}/'
            - source_labels: [__meta_kubernetes_service_name]
              target_label: instance
            - target_label: __address__
              replacement: monitoring-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115

  grafana:
    enabled: true
    strategy:
      type: Recreate
    admin:
      existingSecret: monitoring-secrets
      userKey: GRAFANA_ADMIN_USER
      passwordKey: GRAFANA_ADMIN_PASSWORD
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
    # persistence:
    #   enabled: true
    #   storageClassName: gp2-ebs
    #   size: 5Gi

  alertmanager:
    enabled: true
    # alertmanagerSpec:
      # storage:
      #   volumeClaimTemplate:
      #     spec:
      #       storageClassName: gp2-ebs
      #       accessModes: ["ReadWriteOnce"]
      #       resources:
      #         requests:
      #           storage: 5Gi
    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: "slack"
      receivers:
        - name: "slack"
          slack_configs:
            - api_url: ${SLACK_API_URL}
              channel: ${SLACK_CHANNEL}
              send_resolved: true

prometheus-blackbox-exporter:
  enabled: true
  config:
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          follow_redirects: true
      http_405_ok:
        prober: http
        timeout: 5s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          follow_redirects: true
          valid_status_codes: [200, 405]
      tcp_connect:
        prober: tcp
        timeout: 5s
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    type: ClusterIP
    port: 9115
  serviceMonitor:
    enabled: true
    interval: 30s
