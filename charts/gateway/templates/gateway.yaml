apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: buried-marks-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gatewayClassName }}
  listeners:
  {{- range .Values.listeners }}
  - name: {{ .name }}
    port: {{ .port }}
    protocol: {{ .protocol }}
    allowedRoutes:
      namespaces:
        from: Same
  {{- end }}