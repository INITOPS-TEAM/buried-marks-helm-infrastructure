apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: global-http-to-https-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: buried-marks-gateway
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301